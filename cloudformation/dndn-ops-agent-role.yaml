AWSTemplateFormatVersion: '2010-09-09'
Description: >
  DnDn OpsAgent Role — Deploy this template to a customer AWS account.
  Allows the DnDn platform to collect and analyze infrastructure change history,
  and forward real-time events to the platform.

# ============================================================
#  Parameters (provided by the customer)
# ============================================================
Parameters:
  DnDnPlatformAccountId:
    Type: String
    Description: AWS Account ID where the DnDn platform is hosted
    AllowedPattern: '^\d{12}$'
    ConstraintDescription: Must be a 12-digit number
  ExternalId:
    Type: String
    Description: External ID for cross-account AssumeRole security (issued per customer by DnDn, required)
    MinLength: 8
    NoEcho: true
  DnDnEventBusArn:
    Type: String
    Description: EventBridge bus ARN in the DnDn platform account
    Default: ''
    AllowedPattern: '^(arn:aws:events:[a-z0-9-]+:\d{12}:event-bus/[a-zA-Z0-9._-]+)?$'
    ConstraintDescription: Must be a valid EventBus ARN (empty string allowed to disable forwarding)
  EnableEventForwarding:
    Type: String
    Description: Enable real-time event forwarding (set to true after configuring DnDnEventBusArn)
    AllowedValues: ['true', 'false']
    Default: 'false'

Conditions:
  HasEventBusArn: !Not [!Equals [!Ref DnDnEventBusArn, '']]
  ShouldForwardEvents: !And
    - !Equals [!Ref EnableEventForwarding, 'true']
    - !Condition HasEventBusArn

Resources:

  # ============================================================
  #  IAM Role — DnDn platform accesses via AssumeRole
  # ============================================================
  DnDnOpsAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DnDnOpsAgentRole
      Description: DnDn platform ops automation agent role (read-only)
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${DnDnPlatformAccountId}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                'sts:ExternalId': !Ref ExternalId
      Tags:
        - Key: ManagedBy
          Value: DnDn
        - Key: Purpose
          Value: OpsAutomation

  # ============================================================
  #  Policy 1: CloudTrail — Change event collection
  # ============================================================
  CloudTrailReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Read CloudTrail events
      Roles:
        - !Ref DnDnOpsAgentRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudTrailRead
            Effect: Allow
            Action:
              - cloudtrail:LookupEvents
              - cloudtrail:GetTrailStatus
              - cloudtrail:DescribeTrails
              - cloudtrail:GetEventSelectors
              - cloudtrail:GetInsightSelectors
            Resource: '*'

  # ============================================================
  #  Policy 2: AWS Config — Before/After state comparison
  # ============================================================
  ConfigReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Read AWS Config resource configurations
      Roles:
        - !Ref DnDnOpsAgentRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ConfigRead
            Effect: Allow
            Action:
              - config:GetResourceConfigHistory
              - config:BatchGetResourceConfig
              - config:BatchGetAggregateResourceConfig
              - config:ListDiscoveredResources
              - config:DescribeConfigRules
              - config:GetComplianceDetailsByResource
              - config:DescribeComplianceByResource
              - config:DescribeConfigurationRecorders
              - config:DescribeConfigurationRecorderStatus
            Resource: '*'

  # ============================================================
  #  Policy 3: Security Hub + Access Analyzer — Security posture
  # ============================================================
  SecurityReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Read Security Hub findings and Access Analyzer results
      Roles:
        - !Ref DnDnOpsAgentRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: SecurityHubRead
            Effect: Allow
            Action:
              - securityhub:GetFindings
              - securityhub:BatchGetFindings
              - securityhub:GetInsights
              - securityhub:GetInsightResults
              - securityhub:DescribeHub
              - securityhub:DescribeStandards
              - securityhub:GetEnabledStandards
              - securityhub:DescribeStandardsControls
              - securityhub:ListSecurityControlDefinitions
            Resource: '*'
          - Sid: AccessAnalyzerRead
            Effect: Allow
            Action:
              - access-analyzer:ListFindings
              - access-analyzer:GetFinding
              - access-analyzer:ListAnalyzers
              - access-analyzer:GetAnalyzer
            Resource: '*'

  # ============================================================
  #  Policy 4: Cost Explorer — Cost analysis
  # ============================================================
  CostReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Read Cost Explorer billing data
      Roles:
        - !Ref DnDnOpsAgentRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CostRead
            Effect: Allow
            Action:
              - ce:GetCostAndUsage
              - ce:GetCostAndUsageWithResources
              - ce:GetCostForecast
              - ce:GetReservationUtilization
              - ce:GetSavingsPlansUtilization
              - ce:GetRightsizingRecommendation
              - ce:GetAnomalies
              - ce:GetAnomalyMonitors
            Resource: '*'

  # ============================================================
  #  Policy 5: CloudWatch — Metric comparison
  # ============================================================
  CloudWatchReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Read CloudWatch metrics and logs
      Roles:
        - !Ref DnDnOpsAgentRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: CloudWatchRead
            Effect: Allow
            Action:
              - cloudwatch:GetMetricData
              - cloudwatch:GetMetricStatistics
              - cloudwatch:ListMetrics
              - cloudwatch:DescribeAlarms
              - cloudwatch:DescribeAlarmHistory
              - cloudwatch:DescribeAnomalyDetectors
            Resource: '*'
          - Sid: LogsRead
            Effect: Allow
            Action:
              - logs:DescribeLogGroups
              - logs:FilterLogEvents
              - logs:StartQuery
              - logs:GetQueryResults
              - logs:StopQuery
            Resource: '*'
          - Sid: FlowLogsRead
            Effect: Allow
            Action:
              - ec2:DescribeFlowLogs
            Resource: '*'

  # ============================================================
  #  Policy 6: Common — Resource discovery + integration check
  # ============================================================
  BaseReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Description: Base resource discovery and integration check
      Roles:
        - !Ref DnDnOpsAgentRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: Identity
            Effect: Allow
            Action:
              - sts:GetCallerIdentity
            Resource: '*'
          - Sid: ResourceExplorer
            Effect: Allow
            Action:
              - tag:GetResources
              - tag:GetTagKeys
              - ec2:DescribeRegions
              - ec2:DescribeInstances
              - ec2:DescribeVpcs
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeRouteTables
              - ec2:DescribeNatGateways
              - ec2:DescribeNetworkInterfaces
              - ec2:DescribeAddresses
              - ec2:DescribeVolumes
              - rds:DescribeDBInstances
              - rds:DescribeDBClusters
              - s3:ListAllMyBuckets
              - s3:GetBucketLocation
              - s3:GetPublicAccessBlock
              - s3:GetBucketPublicAccessBlock
              - lambda:ListFunctions
              - lambda:GetFunction
              - ecs:ListClusters
              - ecs:DescribeClusters
              - eks:ListClusters
              - eks:DescribeCluster
              - elasticloadbalancing:DescribeLoadBalancers
              - elasticloadbalancing:DescribeTargetGroups
              - autoscaling:DescribeAutoScalingGroups
              - iam:ListRoles
              - iam:ListPolicies
              - iam:GetAccountSummary
              - iam:ListAccountAliases
              - iam:GetRole
              - iam:ListAccessKeys
              - iam:GetAccessKeyLastUsed
              - kms:DescribeKey
              - sqs:GetQueueAttributes
            Resource: '*'

  # ============================================================
  #  Policy 7: AWS Health — Event detail lookup (for Lambda enricher)
  # ============================================================
  HealthReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:

      Description: Read AWS Health event details and affected resources
      Roles:
        - !Ref DnDnOpsAgentRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: HealthRead
            Effect: Allow
            Action:
              - health:DescribeEventDetails
              - health:DescribeAffectedEntities
              - health:DescribeEvents
            Resource: '*'

  # ============================================================
  #  VPC Flow Logs — Log Group + IAM Role (customer creates Flow Log manually)
  # ============================================================
  FlowLogsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /dndn/vpc-flow-logs
      RetentionInDays: 14
      Tags:
        - Key: ManagedBy
          Value: DnDn

  FlowLogsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DnDnFlowLogsRole
      Description: IAM Role for VPC Flow Logs to publish to CloudWatch Logs
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: FlowLogsPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub '${FlowLogsLogGroup.Arn}:*'
              - Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'
      Tags:
        - Key: ManagedBy
          Value: DnDn

  # ============================================================
  #  EventBridge — Real-time event forwarding (customer account → DnDn platform)
  # ============================================================

  # CloudTrail infrastructure change events → forward to DnDn platform
  CloudTrailEventRule:
    Type: AWS::Events::Rule
    Condition: ShouldForwardEvents
    Properties:
      Name: DnDn-CloudTrail-Changes
      Description: Forward infrastructure change API calls to DnDn platform
      State: ENABLED
      EventPattern:
        source:
          - aws.ec2
          - aws.rds
          - aws.s3
          - aws.lambda
          - aws.ecs
          - aws.eks
          - aws.elasticloadbalancing
          - aws.autoscaling
          - aws.iam
          - aws.cloudformation
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventName:
            - prefix: Create
            - prefix: Delete
            - prefix: Modify
            - prefix: Update
            - prefix: Put
            - prefix: Attach
            - prefix: Detach
            - prefix: Associate
            - prefix: Disassociate
            - RunInstances
            - TerminateInstances
            - StopInstances
            - StartInstances
      Targets:
        - Id: DnDnPlatformBus
          Arn: !Ref DnDnEventBusArn
          RoleArn: !GetAtt EventBridgeForwardRole.Arn

  # Security Hub new findings → forward to DnDn platform
  SecurityHubEventRule:
    Type: AWS::Events::Rule
    Condition: ShouldForwardEvents
    Properties:
      Name: DnDn-SecurityHub-Findings
      Description: Forward new/updated Security Hub findings to DnDn platform
      State: ENABLED
      EventPattern:
        source:
          - aws.securityhub
        detail-type:
          - Security Hub Findings - Imported
          - Security Hub Findings - Custom Action
      Targets:
        - Id: DnDnPlatformBus
          Arn: !Ref DnDnEventBusArn
          RoleArn: !GetAtt EventBridgeForwardRole.Arn

  # Config compliance changes → forward to DnDn platform
  ConfigEventRule:
    Type: AWS::Events::Rule
    Condition: ShouldForwardEvents
    Properties:
      Name: DnDn-Config-Changes
      Description: Forward Config compliance state changes to DnDn platform
      State: ENABLED
      EventPattern:
        source:
          - aws.config
        detail-type:
          - Config Rules Compliance Change
          - Config Configuration Item Change
      Targets:
        - Id: DnDnPlatformBus
          Arn: !Ref DnDnEventBusArn
          RoleArn: !GetAtt EventBridgeForwardRole.Arn

  # AWS Health events → forward to DnDn platform
  HealthEventRule:
    Type: AWS::Events::Rule
    Condition: ShouldForwardEvents
    Properties:
      Name: DnDn-Health-Events
      Description: Forward AWS Health events (maintenance, outage, retirement, etc.) to DnDn platform
      State: ENABLED
      EventPattern:
        source:
          - aws.health
        detail-type:
          - AWS Health Event
      Targets:
        - Id: DnDnPlatformBus
          Arn: !Ref DnDnEventBusArn
          RoleArn: !GetAtt EventBridgeForwardRole.Arn

  # Role for EventBridge to send events cross-account
  EventBridgeForwardRole:
    Type: AWS::IAM::Role
    Condition: ShouldForwardEvents
    Properties:
      RoleName: DnDnEventForwardRole
      Description: Role for EventBridge to forward events to DnDn platform account
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: PutEventsToTarget
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'events:PutEvents'
                Resource: !Ref DnDnEventBusArn
      Tags:
        - Key: ManagedBy
          Value: DnDn

# ============================================================
#  Outputs
# ============================================================
Outputs:
  RoleArn:
    Description: IAM Role ARN for DnDn platform to AssumeRole
    Value: !GetAtt DnDnOpsAgentRole.Arn
  RoleName:
    Description: Name of the created IAM role
    Value: !Ref DnDnOpsAgentRole
  EventForwardingEnabled:
    Description: Whether event forwarding is enabled
    Value: !Ref EnableEventForwarding
  EventForwardRoleArn:
    Condition: ShouldForwardEvents
    Description: EventBridge forwarding role ARN
    Value: !GetAtt EventBridgeForwardRole.Arn
  FlowLogsLogGroupName:
    Description: CloudWatch Log Group for VPC Flow Logs — select this when creating Flow Logs in VPC console
    Value: !Ref FlowLogsLogGroup
  FlowLogsRoleArn:
    Description: IAM Role ARN for VPC Flow Logs — select this when creating Flow Logs in VPC console
    Value: !GetAtt FlowLogsRole.Arn
