AWSTemplateFormatVersion: "2010-09-09"
Description: >
  DnDn Cognito User Pool — 사용자 인증 (이메일+비밀번호, AdminCreateUser 전용)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: 배포 환경

Resources:
  # ---------------------------------------------------------------
  # Cognito User Pool
  # ---------------------------------------------------------------
  DnDnUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "DnDn_UserPool_${Environment}"

      # 로그인 속성: 이메일
      UsernameAttributes:
        - email
      AutoVerifiedAttributes: []   # 이메일 인증 비활성화

      # 셀프 가입 비활성화 — AdminCreateUser만 허용
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailSubject: "[DnDn] 계정이 생성되었습니다"
          EmailMessage: >
            안녕하세요, DnDn 플랫폼 계정이 생성되었습니다.
            임시 비밀번호: {####}
            첫 로그인 시 비밀번호를 변경해 주세요.
          SMSMessage: "DnDn 임시 비밀번호: {####}"

      # 비밀번호 정책 (프론트 PW_RULES와 일치)
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7

      # MFA 비활성화 (추후 개발 예정)
      MfaConfiguration: "OFF"

      # 사용자 속성 스키마
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: false
          Mutable: true

      # 계정 복구: 이메일만
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

      # 사용자명 대소문자 구분 안 함
      UsernameConfiguration:
        CaseSensitive: false

      Tags:
        - Key: Project
          Value: DnDn
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------
  # App Client (프론트엔드/백엔드용, 시크릿 없음)
  # ---------------------------------------------------------------
  DnDnUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "DnDn_AppClient_${Environment}"
      UserPoolId: !Ref DnDnUserPool
      GenerateSecret: false          # SPA에서 사용 — 시크릿 없음

      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH    # 이메일+비밀번호 로그인
        - ALLOW_REFRESH_TOKEN_AUTH    # 토큰 갱신

      # 토큰 만료 설정
      AccessTokenValidity: 1          # 1시간
      IdTokenValidity: 1              # 1시간
      RefreshTokenValidity: 30        # 30일
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

      # 토큰 취소 활성화 (로그아웃 시 필요)
      EnableTokenRevocation: true

      PreventUserExistenceErrors: ENABLED   # 사용자 존재 여부 노출 방지

# ---------------------------------------------------------------
# Outputs — 배포 후 앱 설정에 사용
# ---------------------------------------------------------------
Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref DnDnUserPool
    Export:
      Name: !Sub "${Environment}-DnDn-UserPoolId"

  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt DnDnUserPool.Arn
    Export:
      Name: !Sub "${Environment}-DnDn-UserPoolArn"

  AppClientId:
    Description: Cognito App Client ID
    Value: !Ref DnDnUserPoolClient
    Export:
      Name: !Sub "${Environment}-DnDn-AppClientId"

  CognitoRegion:
    Description: Cognito Region
    Value: !Ref "AWS::Region"
