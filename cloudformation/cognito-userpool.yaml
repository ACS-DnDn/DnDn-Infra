AWSTemplateFormatVersion: "2010-09-09"
Description: >
  DnDn Cognito User Pool — User authentication (email+password, AdminCreateUser only)

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

Resources:
  # ---------------------------------------------------------------
  # Cognito User Pool
  # ---------------------------------------------------------------
  DnDnUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "DnDn_UserPool_${Environment}"

      # Login attribute: email
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email   # AdminCreateUser sets email_verified=true automatically — required for account recovery

      # Disable self sign-up — AdminCreateUser only
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailSubject: "[DnDn] Your account has been created"
          EmailMessage: >
            Hello, your DnDn platform account has been created.
            Temporary password: {####}
            Please change your password on first login.
          SMSMessage: "DnDn temporary password: {####}"

      # Password policy (matches frontend PW_RULES)
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7

      # MFA disabled (planned for future)
      MfaConfiguration: "OFF"

      # User attribute schema
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true
        - Name: name
          AttributeDataType: String
          Required: false
          Mutable: true

      # Account recovery: email only
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1

      # Case-insensitive username
      UsernameConfiguration:
        CaseSensitive: false

      Tags:
        - Key: Project
          Value: DnDn
        - Key: Environment
          Value: !Ref Environment

  # ---------------------------------------------------------------
  # App Client (for frontend/backend, no secret)
  # ---------------------------------------------------------------
  DnDnUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "DnDn_AppClient_${Environment}"
      UserPoolId: !Ref DnDnUserPool
      GenerateSecret: false          # Used by SPA — no secret

      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH    # Email+password login
        - ALLOW_REFRESH_TOKEN_AUTH    # Token refresh

      # Token expiration settings
      AccessTokenValidity: 1          # 1 hour
      IdTokenValidity: 1              # 1 hour
      RefreshTokenValidity: 30        # 30 days
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days

      # Enable token revocation (required for logout)
      EnableTokenRevocation: true

      PreventUserExistenceErrors: ENABLED   # Prevent user existence disclosure

# ---------------------------------------------------------------
# Outputs — used for app configuration after deployment
# ---------------------------------------------------------------
Outputs:
  UserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref DnDnUserPool
    Export:
      Name: !Sub "${Environment}-DnDn-UserPoolId"

  UserPoolArn:
    Description: Cognito User Pool ARN
    Value: !GetAtt DnDnUserPool.Arn
    Export:
      Name: !Sub "${Environment}-DnDn-UserPoolArn"

  AppClientId:
    Description: Cognito App Client ID
    Value: !Ref DnDnUserPoolClient
    Export:
      Name: !Sub "${Environment}-DnDn-AppClientId"

  CognitoRegion:
    Description: Cognito Region
    Value: !Ref "AWS::Region"
    Export:
      Name: !Sub "${Environment}-DnDn-CognitoRegion"
