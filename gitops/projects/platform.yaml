apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: DnDn platform workloads managed by Argo CD
  sourceRepos:
    - https://github.com/ACS-DnDn/DnDn-Infra.git
    - https://charts.external-secrets.io
  destinations:
    - namespace: dndn-api
      server: https://kubernetes.default.svc
    - namespace: dndn-web
      server: https://kubernetes.default.svc
    - namespace: dndn-hr
      server: https://kubernetes.default.svc
    - namespace: dndn-report
      server: https://kubernetes.default.svc
    - namespace: dndn-worker
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
