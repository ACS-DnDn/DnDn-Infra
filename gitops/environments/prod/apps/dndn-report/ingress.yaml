apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dndn-report-ingress
  namespace: dndn-report
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-northeast-2:387721658341:certificate/194abb5d-ccae-45d6-a436-eb105bb09f89"
    alb.ingress.kubernetes.io/group.name: dndn-public
    alb.ingress.kubernetes.io/group.order: "20"
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  rules:
    - host: www.dndn.cloud
      http:
        paths:
          - path: /report-api
            pathType: Prefix
            backend:
              service:
                name: dndn-report
                port:
                  number: 8000
    - host: dndn.cloud
      http:
        paths:
          - path: /report-api
            pathType: Prefix
            backend:
              service:
                name: dndn-report
                port:
                  number: 8000
