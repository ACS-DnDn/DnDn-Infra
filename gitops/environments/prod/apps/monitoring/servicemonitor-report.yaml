apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dndn-report
  namespace: monitoring
  labels:
    release: kube-prometheus
spec:
  namespaceSelector:
    matchNames:
      - dndn-report
  selector:
    matchLabels:
      app: dndn-report-api
  endpoints:
    - port: http
      path: /metrics/
      interval: 30s
