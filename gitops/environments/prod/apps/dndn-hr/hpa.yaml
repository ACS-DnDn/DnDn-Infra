apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dndn-hr-hpa
  namespace: dndn-hr
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dndn-hr
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
