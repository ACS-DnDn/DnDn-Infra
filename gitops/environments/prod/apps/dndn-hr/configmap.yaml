apiVersion: v1
kind: ConfigMap
metadata:
  name: dndn-hr-nginx
  namespace: dndn-hr
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      # SPA fallback — React Router 지원
      location / {
        try_files $uri $uri/ /index.html;
      }

      # 캐시 설정
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }
