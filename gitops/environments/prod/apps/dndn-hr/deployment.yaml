apiVersion: apps/v1
kind: Deployment
metadata:
  name: dndn-hr
  namespace: dndn-hr
  labels:
    app: dndn-hr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dndn-hr
  template:
    metadata:
      labels:
        app: dndn-hr
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101      # nginx user
        fsGroup: 101
      containers:
        - name: hr
          image: 387721658341.dkr.ecr.ap-northeast-2.amazonaws.com/dndn-prd-hr:1b916cba6d8db2f618f7f561fc213e65b8867f54
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: dndn-hr-nginx
