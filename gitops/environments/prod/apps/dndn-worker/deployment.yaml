apiVersion: apps/v1
kind: Deployment
metadata:
  name: dndn-worker
  namespace: dndn-worker
  labels:
    app: dndn-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dndn-worker
  template:
    metadata:
      labels:
        app: dndn-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      serviceAccountName: dndn-worker-sa
      containers:
        - name: worker
          image: 387721658341.dkr.ecr.ap-northeast-2.amazonaws.com/dndn-prd-worker:bde13c30ac8e0581b5b3c6608251de66fd48bf92
          securityContext:
            allowPrivilegeEscalation: false
          envFrom:
            - configMapRef:
                name: dndn-worker-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
