apiVersion: v1
kind: Secret
metadata:
  name: dndn-api-secret
  namespace: dndn-api
type: Opaque
stringData:
  SQLALCHEMY_DATABASE_URL: ""       # mysql+pymysql://USER:PASSWORD@RDS_ENDPOINT:3306/dndn
  STS_EXTERNAL_ID: ""               # 고객 계정 연동 시 설정
  INTERNAL_API_KEY: ""              # Lambda ↔ API 내부 인증 키
  GITHUB_CLIENT_ID: ""              # GitHub OAuth App
  GITHUB_CLIENT_SECRET: ""          # GitHub OAuth App
  SLACK_CLIENT_ID: ""               # Slack OAuth App
  SLACK_CLIENT_SECRET: ""           # Slack OAuth App
