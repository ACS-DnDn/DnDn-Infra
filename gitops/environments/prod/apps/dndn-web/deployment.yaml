apiVersion: apps/v1
kind: Deployment
metadata:
  name: dndn-web
  namespace: dndn-web
  labels:
    app: dndn-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dndn-web
  template:
    metadata:
      labels:
        app: dndn-web
    spec:
      containers:
        - name: web
          image: 387721658341.dkr.ecr.ap-northeast-2.amazonaws.com/dndn-prd-web:latest
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: dndn-web-nginx
