apiVersion: apps/v1
kind: Deployment
metadata:
  name: dndn-web
  namespace: dndn-web
  labels:
    app: dndn-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dndn-web
  template:
    metadata:
      labels:
        app: dndn-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101      # nginx user
        fsGroup: 101
      containers:
        - name: web
          image: 387721658341.dkr.ecr.ap-northeast-2.amazonaws.com/dndn-prd-web:368575e874cde955d36eb13ca2dd5f8d13f8e158
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-conf
          configMap:
            name: dndn-web-nginx
