# NOTE:
# Argo CD root app은 kustomize path restriction 때문에 prod/root 바깥 파일을 직접 참조할 수 없습니다.
# 이 파일은 root source가 self-contained 하게 렌더되도록 둔 local copy이며,
# 구조 변경 시 gitops/projects/platform.yaml 와 함께 맞춰야 합니다.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: DnDn platform workloads managed by Argo CD
  sourceRepos:
    - https://github.com/ACS-DnDn/DnDn-Infra.git
    - https://charts.external-secrets.io
  destinations:
    - namespace: dndn-api
      server: https://kubernetes.default.svc
    - namespace: dndn-web
      server: https://kubernetes.default.svc
    - namespace: dndn-hr
      server: https://kubernetes.default.svc
    - namespace: dndn-report
      server: https://kubernetes.default.svc
    - namespace: dndn-worker
      server: https://kubernetes.default.svc
    - namespace: external-secrets
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
