# ── ALB Ingress: dndn.cloud — Web 프론트엔드 (기본 라우트) ─────────────────
# 동일 ALB를 공유하기 위해 group.name = "dndn-public" 사용
# 각 네임스페이스별 Ingress를 group.order로 우선순위 지정
#
# certificate-arn은 terraform apply 후 output 값으로 채울 것:
#   terraform output acm_certificate_arn
#   terraform output acm_hr_certificate_arn
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dndn-web-ingress
  namespace: dndn-web
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-northeast-2:387721658341:certificate/194abb5d-ccae-45d6-a436-eb105bb09f89"
    alb.ingress.kubernetes.io/group.name: dndn-public
    alb.ingress.kubernetes.io/group.order: "100"
    alb.ingress.kubernetes.io/healthcheck-path: /
spec:
  rules:
    - host: www.dndn.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dndn-web
                port:
                  number: 80
    - host: dndn.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dndn-web
                port:
                  number: 80
