apiVersion: v1
kind: ConfigMap
metadata:
  name: dndn-dev-api-config
  namespace: dndn-dev-api
data:
  AWS_REGION: "ap-northeast-2"
  COGNITO_USER_POOL_ID: "REPLACE_ME_DEV_COGNITO_USER_POOL_ID"
  COGNITO_CLIENT_ID: "REPLACE_ME_DEV_COGNITO_CLIENT_ID"
  PLATFORM_ACCOUNT_ID: "387721658341"
  STS_ROLE_NAME: "DnDnOpsAgentRole"
  CFN_TEMPLATE_URL: "REPLACE_ME_DEV_CFN_TEMPLATE_URL"
  EVENT_BUS_ARN: "REPLACE_ME_DEV_EVENT_BUS_ARN"
  S3_BUCKET: "dndn-dev-s3"
  S3_PRESIGNED_EXPIRES: "3600"
  MAX_UPLOAD_SIZE_MB: "100"
  SCHEDULER_GROUP_NAME: "dndn-dev-schedules"
  SCHEDULER_ROLE_ARN: "REPLACE_ME_DEV_SCHEDULER_ROLE_ARN"
  SCHEDULER_TARGET_ARN: "REPLACE_ME_DEV_SCHEDULER_TARGET_ARN"
  REPORT_REQUEST_QUEUE_URL: "https://sqs.ap-northeast-2.amazonaws.com/387721658341/dndn-dev-sqs-report-request"
  GITHUB_REDIRECT_URI: "https://www.dev.dndn.cloud/auth/github/callback"
  SLACK_REDIRECT_URI: "https://www.dev.dndn.cloud/auth/slack/callback"
  GITHUB_WEBHOOK_URL: "https://www.dev.dndn.cloud/api/github/webhook"
