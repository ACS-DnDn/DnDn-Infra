apiVersion: v1
kind: ConfigMap
metadata:
  name: dndn-dev-report-config
  namespace: dndn-dev-report
data:
  AWS_REGION: "ap-northeast-2"
  ALLOWED_ORIGINS: "https://www.dev.dndn.cloud,https://dev.dndn.cloud"
  BEDROCK_MODEL_ID: "apac.anthropic.claude-3-5-sonnet-20241022-v2:0"
  S3_BUCKET: "dndn-dev-s3"
  S3_PRESIGNED_EXPIRES: "3600"
  SQS_QUEUE_URL: "https://sqs.ap-northeast-2.amazonaws.com/387721658341/dndn-dev-sqs-s3-event"
  POLL_INTERVAL: "5"
  DNDN_API_URL: "http://dndn-dev-api.dndn-dev-api.svc.cluster.local:8000"
