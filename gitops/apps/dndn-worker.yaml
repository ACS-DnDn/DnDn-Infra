apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dndn-worker
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/ACS-DnDn/DnDn-Infra.git
    targetRevision: main
    path: gitops/environments/prod/apps/dndn-worker
  destination:
    server: https://kubernetes.default.svc
    namespace: dndn-worker
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
