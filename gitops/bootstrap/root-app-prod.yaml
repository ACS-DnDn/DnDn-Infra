apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dndn-prod-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ACS-DnDn/DnDn-Infra.git
    targetRevision: main
    path: gitops/environments/prod/root
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
