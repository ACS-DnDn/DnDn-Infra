apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dndn-root-dev
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/ACS-DnDn/DnDn-Infra.git
    targetRevision: feature/gitops-foundation
    path: gitops/environments/dev/root
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
