# Scaffold only.
# dev cluster와 child app manifest가 준비된 뒤에만 apply합니다.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dndn-dev-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ACS-DnDn/DnDn-Infra.git
    targetRevision: main
    path: gitops/environments/dev/root
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
