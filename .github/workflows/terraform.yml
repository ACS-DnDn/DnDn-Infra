name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
  push:
    branches: [main]
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
      target:
        description: 'Optional Terraform target address (e.g. module.iam_irsa.aws_iam_role_policy.reporter_bedrock)'
        required: false
        type: string
      reason:
        description: '수동 실행 사유'
        required: false
        type: string

permissions:
  id-token: write   # OIDC 토큰 발급
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-northeast-2
  TF_WORKING_DIR: terraform/envs/prod
  TF_VAR_internal_api_key: ${{ secrets.TF_VAR_INTERNAL_API_KEY }}
  TF_VAR_api_internal_url: ${{ secrets.TF_VAR_API_INTERNAL_URL }}

jobs:
  terraform:
    name: ${{ github.event_name == 'push' && 'Apply' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'apply' && github.ref == 'refs/heads/main' && 'Manual Apply' || 'Plan') }}
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-prod
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::387721658341:role/DnDn-PRD-GHA-Terraform-Role
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Workflow Summary
        env:
          TF_MODE: ${{ github.event.inputs.mode }}
          TF_TARGET: ${{ github.event.inputs.target }}
          TF_REASON: ${{ github.event.inputs.reason }}
        run: |
          echo "### Terraform Run" >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "- event: ${GITHUB_EVENT_NAME}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            printf '%s\n' "- mode: ${TF_MODE}" >> "$GITHUB_STEP_SUMMARY"
            if [ -n "${TF_TARGET}" ]; then
              printf '%s\n' "- target: ${TF_TARGET}" >> "$GITHUB_STEP_SUMMARY"
            else
              printf '%s\n' "- target: full apply/plan" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -n "${TF_REASON}" ]; then
              printf '%s\n' "- reason: ${TF_REASON}" >> "$GITHUB_STEP_SUMMARY"
            else
              printf '%s\n' "- reason: n/a" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Validate Manual Apply Ref
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'apply' && github.ref != 'refs/heads/main'
        run: |
          echo "Manual apply is only allowed from refs/heads/main. Current ref: ${GITHUB_REF}" >&2
          exit 1

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_TARGET: ${{ github.event.inputs.target }}
        run: |
          PLAN_ARGS=( -input=false -no-color -out=tfplan )
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${TF_TARGET}" ]; then
            if printf '%s' "${TF_TARGET}" | grep -Eq '[[:space:]]'; then
              echo "Invalid Terraform target address: ${TF_TARGET}" >&2
              exit 1
            fi
            PLAN_ARGS+=( "-target=${TF_TARGET}" )
          fi
          terraform plan "${PLAN_ARGS[@]}"
        continue-on-error: ${{ github.event_name == 'pull_request' }}

      # PR일 때: Plan 결과를 PR 댓글로 게시
      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const plan = execSync('terraform show -no-color tfplan', {
              cwd: '${{ env.TF_WORKING_DIR }}'
            }).toString();
            const body = `### Terraform Plan\n\`\`\`hcl\n${plan.slice(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # main push 또는 수동 apply일 때: Apply
      - name: Terraform Apply
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.mode == 'apply')
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
