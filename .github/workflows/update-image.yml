name: Update K8s Image Tag

# dndn-app 레포에서 ECR 이미지 push 후 repository_dispatch로 트리거
# 매니페스트의 이미지 태그를 업데이트하고 커밋 → Bastion 경유 kubectl apply

on:
  repository_dispatch:
    types: [image-update]
    # client_payload 예시:
    # { "app": "dndn-api", "image": "387721658341.dkr.ecr.ap-northeast-2.amazonaws.com/dndn-prd-api:abc123" }

permissions:
  contents: write

jobs:
  update:
    name: Update manifest image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update deployment image
        run: |
          APP="${{ github.event.client_payload.app }}"
          IMAGE="${{ github.event.client_payload.image }}"

          # 입력값 검증 — 허용된 앱 이름과 ECR 이미지 형식만 통과
          if [[ ! "$APP" =~ ^dndn-(api|web|hr|worker|report)$ ]]; then
            echo "::error::Invalid app name: $APP"
            exit 1
          fi
          if [[ ! "$IMAGE" =~ ^[0-9]+\.dkr\.ecr\.[a-z0-9-]+\.amazonaws\.com/dndn-prd-[a-z]+:[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid image format: $IMAGE"
            exit 1
          fi

          MANIFEST="gitops/environments/prod/apps/${APP}/deployment.yaml"

          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Manifest not found: $MANIFEST"
            exit 1
          fi

          # sed로 image 라인 교체
          sed -i "s|image: .*|image: ${IMAGE}|" "$MANIFEST"

          echo "Updated ${MANIFEST} → ${IMAGE}"
          cat "$MANIFEST" | grep "image:"

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update ${{ github.event.client_payload.app }} image to ${{ github.event.client_payload.image }}"
          git push

  deploy:
    name: Apply to EKS via Bastion
    needs: update
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BASTION_SSH_KEY }}" > ~/.ssh/bastion.pem
          chmod 600 ~/.ssh/bastion.pem
          ssh-keyscan -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via Bastion
        run: |
          APP="${{ github.event.client_payload.app }}"
          IMAGE="${{ github.event.client_payload.image }}"

          # Bastion에 SSH 접속하여 kubectl set image 실행
          # Bastion에는 aws cli + kubectl이 미리 설치되어 있어야 함
          ssh -i ~/.ssh/bastion.pem ec2-user@${{ secrets.BASTION_HOST }} << EOF
            aws eks update-kubeconfig --name dndn-prd --region ap-northeast-2
            NAMESPACE="${APP}"

            if [ "${APP}" = "dndn-report" ]; then
              kubectl set image deployment/dndn-report-api -n \${NAMESPACE} report-api=${IMAGE}
              kubectl set image deployment/dndn-report-worker -n \${NAMESPACE} report-worker=${IMAGE}
              kubectl rollout status deployment/dndn-report-api -n \${NAMESPACE} --timeout=120s
              kubectl rollout status deployment/dndn-report-worker -n \${NAMESPACE} --timeout=120s
            else
              kubectl set image deployment/${APP} -n \${NAMESPACE} \
                \$(kubectl get deployment/${APP} -n \${NAMESPACE} -o jsonpath='{.spec.template.spec.containers[0].name}')=${IMAGE}
              kubectl rollout status deployment/${APP} -n \${NAMESPACE} --timeout=120s
            fi
          EOF
